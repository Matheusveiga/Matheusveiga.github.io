<header class="dialog-header">
  <div>
    <h2 mat-dialog-title>{{ getData()?.title }}</h2>
  </div>
  <button mat-dialog-close class="dialog-close" aria-label="Fechar">Fechar</button>
</header>

<mat-dialog-content>
  <h3>Descrição</h3>
  <article [innerHTML]="getData()?.description"></article>

  <nav class="dialog-links">
    @for(item of getData()?.links; track item){
      <a [href]="item.href" target="_blank">{{item.name}}</a>
    }
  </nav>
</mat-dialog-content>
