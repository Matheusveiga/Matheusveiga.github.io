<section class="section-card container mx-auto px-4 lg:px-0">
  <div class="section-header">
    <h2>Projetos desenvolvidos</h2>
    <p>Uma seleção de projetos com foco em usabilidade, estrutura modular e design limpo.</p>
  </div>
  <ul class="project-grid">
        @for(item of arrayProjects(); track item){
      <li class="project-card">
        <button class="project-card-button" (click)="openDialog(item)">
          <img
            [src]="item.src"
            [alt]="item.alt"
            [attr.width]="item.width"
            [attr.height]="item.height"
            loading="lazy"
          >
        </button>
      </li>
        }
  </ul>
</section>
